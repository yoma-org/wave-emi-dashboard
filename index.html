<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wave EMI Pipeline — Intake & Approval Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#001E4E;--blue:#0057B8;--blue-light:#1a7fe8;--accent:#00C2D4;
  --bg:#f0f4fa;--surface:#fff;--border:#e2e8f0;
  --text:#1a2540;--muted:#64748b;--success:#16a34a;--warn:#d97706;--danger:#dc2626;
  --radius:12px;--shadow:0 2px 12px rgba(0,30,78,.08);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV */
nav{background:var(--navy);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3);}
.nav-logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;font-size:16px;white-space:nowrap;}
.nav-logo span{background:var(--accent);color:var(--navy);border-radius:6px;padding:2px 8px;font-size:13px;font-weight:800;}
.nav-links{display:flex;gap:4px;}
.nav-btn{background:none;border:none;color:rgba(255,255,255,.7);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;transition:.2s;}
.nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.12);color:#fff;}
.nav-tag{background:var(--accent);color:var(--navy);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;cursor:pointer;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-right select{padding:6px 12px;border-radius:8px;font-size:13px;font-family:inherit;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;outline:none;}
.nav-right select option{color:var(--text);background:#fff;}

/* LAYOUT */
main{max-width:1100px;margin:0 auto;padding:28px 24px;}
.page{display:none;opacity:0;transition:opacity .15s ease;}.page.active{display:block;opacity:1;}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:16px;}
.card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-body{padding:24px;}
.card-title{font-weight:700;font-size:15px;}

/* SUMMARY ROW — 5 columns for dashboard metrics */
.summary-row-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:800;color:var(--navy);}
.stat-card.urgent .stat-value{color:var(--danger);}
.stat-card.warn .stat-value{color:var(--warn);}
.stat-card.ok .stat-value{color:var(--success);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-danger{background:#fee2e2;color:var(--danger);}
.badge-warn{background:#fef3c7;color:var(--warn);}
.badge-success{background:#dcfce7;color:var(--success);}
.badge-blue{background:#dbeafe;color:var(--blue);}
.badge-muted{background:#f1f5f9;color:var(--muted);}
.badge-purple{background:#f3e8ff;color:#7c3aed;}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* STATUS BADGES */
.badge-awaiting{background:#e2e8f0;color:#475569;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-pending{background:#fef3c7;color:#856404;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-ready{background:#dcfce7;color:#155724;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-rejected{background:#fee2e2;color:#721c24;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-sent{background:#cce5ff;color:#004085;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-type-otc{background:#e0e7ff;color:#3730a3;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-type-ma{background:#dbeafe;color:#1e40af;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-risk-high{background:#fee2e2;color:#dc2626;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-risk-medium{background:#fef3c7;color:#d97706;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}
.badge-risk-low{background:#dcfce7;color:#16a34a;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;}

/* BUTTONS */
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:var(--blue-light);}
.btn-success{background:var(--success);color:#fff;}.btn-success:hover{opacity:.9;}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}.btn-outline:hover{background:#eff6ff;}
.btn-ghost{background:transparent;color:var(--muted);}.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{opacity:.9;}
.btn-sm{padding:6px 14px;font-size:13px;}
.btn-group{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* FORM */
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.form-label .req{color:var(--danger);}
textarea,input[type=text],input[type=file],select.form-control{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:.2s;color:var(--text);}
textarea:focus,input[type=text]:focus,select.form-control:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,87,184,.1);}
textarea{resize:vertical;min-height:120px;}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:.2s;background:#fafbff;position:relative;}
.upload-zone:hover{border-color:var(--blue);background:#eff6ff;}
.upload-zone.has-file{border-color:var(--success);background:#f0fdf4;}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-icon{font-size:28px;margin-bottom:6px;}
.upload-label{font-size:14px;font-weight:600;color:var(--blue);margin-bottom:4px;}
.upload-hint{font-size:12px;color:var(--muted);}

/* TABLES */
.ticket-table{width:100%;border-collapse:collapse;font-size:13px;}
.ticket-table th{text-align:left;padding:10px 14px;background:var(--bg);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
.ticket-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ticket-table tr:hover td{background:#f8faff;}

.matrix-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px;}
.matrix-table th{text-align:left;padding:8px 12px;background:var(--bg);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;}
.matrix-table td{padding:8px 12px;border-bottom:1px solid var(--border);}

.csv-table{width:100%;border-collapse:collapse;font-size:13px;}
.csv-table th{background:#f8faff;color:var(--muted);font-weight:600;padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);}
.csv-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
.csv-table tr:hover td{background:#f8faff;}
.csv-table tr.invalid td{background:#fff5f5;}

/* ALERTS */
.alert{padding:14px 18px;border-radius:10px;font-size:14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.alert-success{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d;}
.alert-danger{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239;}
.alert-info{background:#eff6ff;border:1px solid #93c5fd;color:#1e40af;}

/* CHECK ROW */
.check-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.check-row:last-child{border-bottom:none;}
.check-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center;}
.check-text{flex:1;}
.check-title{font-weight:600;font-size:14px;}
.check-detail{font-size:13px;color:var(--muted);margin-top:2px;}

/* AMOUNTS CHECK */
.amounts-check{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:16px;}
.ac-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.ac-row:last-child{border-bottom:none;}
.ac-icon{font-size:16px;flex-shrink:0;width:24px;text-align:center;}
.ac-label{font-weight:600;font-size:13px;min-width:180px;}
.ac-detail{font-size:13px;color:var(--muted);flex:1;}

/* EMAIL CARD */
.email-card{border-left:4px solid var(--blue);margin-bottom:16px;}
.email-card.parsed{border-left-color:var(--success);opacity:.85;}
.email-card .card-body{padding:20px 24px;}

/* ACTIVITY LOG */
.activity-entry{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.activity-entry:last-child{border-bottom:none;}
.activity-time{color:var(--muted);font-weight:600;font-size:12px;margin-right:8px;}

/* ROLE LOCKED */
.role-locked{text-align:center;padding:60px 20px;}
.role-locked-icon{font-size:48px;margin-bottom:16px;}
.role-locked h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.role-locked p{font-size:14px;color:var(--muted);}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.section-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.section-sub{font-size:14px;color:var(--muted);margin-bottom:20px;}

/* SLIP PREVIEW */
.slip-preview{max-width:100%;max-height:400px;border-radius:8px;border:1px solid var(--border);margin-top:8px;}

/* EXPANDER */
.expander-toggle{cursor:pointer;color:var(--blue);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;padding:6px 0;}
.expander-toggle:hover{text-decoration:underline;}
.expander-body{display:none;margin-top:8px;}
.expander-body.open{display:block;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;max-width:520px;width:90%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.6;}

/* TOAST */
#toast{position:fixed;bottom:28px;right:28px;background:var(--navy);color:#fff;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;transform:translateY(10px);transition:.3s;z-index:300;pointer-events:none;max-width:400px;}
#toast.show{opacity:1;transform:translateY(0);}

@media(max-width:700px){
  .summary-row-5{grid-template-columns:1fr 1fr;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .nav-links{display:none;}
  nav{padding:0 16px;}
  main{padding:16px;}
  .ticket-table{font-size:12px;}
  .ticket-table th,.ticket-table td{padding:8px 10px;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><span>W</span> Wave EMI Pipeline</div>
  <div class="nav-links">
    <button class="nav-btn active" onclick="showPage('dashboard')" id="nav-dashboard">Dashboard</button>
    <button class="nav-btn" onclick="showPage('emails')" id="nav-emails">Incoming Emails</button>
    <button class="nav-btn" onclick="showPage('finance')" id="nav-finance">Finance Approval</button>
    <button class="nav-btn" onclick="showPage('emoney')" id="nav-emoney">E-Money Review</button>
  </div>
  <div class="nav-right">
    <select id="role-select" onchange="switchRole(this.value)">
      <option value="Intake / Maker">Intake / Maker</option>
      <option value="Finance">Finance</option>
      <option value="E-Money">E-Money</option>
    </select>
    <span class="nav-tag" onclick="document.getElementById('demo-modal').classList.add('open')">DEMO</span>
  </div>
</nav>

<main>
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-emails"></div>
  <div class="page" id="page-finance"></div>
  <div class="page" id="page-emoney"></div>
</main>

<div class="modal-overlay" id="demo-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h3>Demo Mode</h3>
    <p>Role access uses client-side state, not real authentication. Production requires: JWT/OAuth, encrypted sessions, server-side role enforcement, and audit logging.<br><br><strong>Do not process real customer data in this version.</strong></p>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="document.getElementById('demo-modal').classList.remove('open')">Got it</button>
      <button class="btn btn-danger" onclick="resetDemo()">Reset Demo</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════════
   WAVE EMI PIPELINE — VANILLA JS (Steps 1-3: Intake, Pre-checks, Finance)
   Bridges to: https://dknguyentrustify.github.io/Wave-eMoney/ (Steps 4-7)
   ═══════════════════════════════════════════════════════════════════════════════ */

const CHECKER_URL = 'https://dknguyentrustify.github.io/Wave-eMoney/';
const LS_TICKETS = 'emi_tickets';
const LS_ACTIVITY = 'emi_activity';
const LS_PARSED = 'emi_parsed';
const LS_ROLE = 'emi_role';

// ─── MOCK EMAIL DATA ──────────────────────────────────────────────────────────
const MOCK_EMAILS = [
  {
    id:'EMAIL-001', subject:'Salary Disbursement \u2013 Myanmar Brewery Ltd',
    from:'accounts@myanmarbrewery.com', received:'2026-04-02 09:14',
    company:'Myanmar Brewery Ltd', type:'SalaryToMA',
    amount_requested:4800000, amount_on_bank_slip:4800000, currency:'MMK',
    scenario:'NORMAL',
    required_approvals:['Sales HOD','Finance Manager'],
    approvals:[
      {name:'U Kyaw Zin', role:'Sales HOD', status:'Approved'},
      {name:'Daw Aye Myint', role:'Finance Manager', status:'Approved'},
    ],
    body_preview:'Please process salary disbursement for 48 employees. Bank slip and employee list attached. Approved by U Kyaw Zin (Sales HOD) and Daw Aye Myint (Finance Manager).',
  },
  {
    id:'EMAIL-002', subject:'EMI Request \u2013 Thiri Dar Co. Ltd',
    from:'finance@thirdar.com', received:'2026-04-02 10:02',
    company:'Thiri Dar Co. Ltd', type:'SalaryToMA',
    amount_requested:3200000, amount_on_bank_slip:3500000, currency:'MMK',
    scenario:'AMOUNT_MISMATCH',
    required_approvals:['Sales HOD','Finance Manager'],
    approvals:[
      {name:'Ko Aung Myat', role:'Sales Manager', status:'Approved'},
      {name:'Ma Hnin Wai', role:'Finance Officer', status:'Approved'},
    ],
    body_preview:'Attached bank slip and employee list for this month\'s salary run. Approved by Ko Aung Myat (Sales Manager).',
  },
  {
    id:'EMAIL-003', subject:'OTC Disbursement Request \u2013 Mega Steel Industries',
    from:'hr@megasteel.mm', received:'2026-04-02 11:30',
    company:'Mega Steel Industries', type:'SalaryToOTC',
    amount_requested:11500000, amount_on_bank_slip:11500000, currency:'MMK',
    scenario:'MISSING_APPROVAL',
    required_approvals:['Sales HOD','Finance Manager'],
    approvals:[
      {name:'U Zaw Lin', role:'Sales Manager', status:'Approved'},
    ],
    body_preview:'Please find attached the employee list and bank confirmation for OTC salary processing. Approved by U Zaw Lin (Sales Manager). Awaiting Finance sign-off.',
  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  tickets: {},
  activityLog: [],
  parsedEmails: new Set(),
  currentRole: 'Intake / Maker',
};
// Runtime-only storage for bank slip image data URLs (not persisted to localStorage)
const slipDataUrls = {};
// Runtime storage for processed employee data before save
const pendingEmployeeData = {};

// ─── MYANMAR PREFIXES & COLUMN ALIASES ────────────────────────────────────────
const MYANMAR_PREFIXES = ['Nang','Mrs.','Mrs','Daw','Mr.','Ms.','Dr.','Saw','Nai','Sai','Mr','Ms','Dr','Mg','Ma','Ko','U'];
const COLUMN_ALIASES = {
  name:['name','employee name','emp name','full name'],
  msisdn:['msisdn','phone','mobile','phone number','mobile number','number'],
  amount:['amount','salary','amt','disbursement amount'],
};

// ─── BUSINESS LOGIC ───────────────────────────────────────────────────────────

function normalizeMsisdn(raw){
  let s = String(raw).trim().replace(/[\s-]/g,'');
  if(s.startsWith('+959')) s = '0'+s.slice(3);
  else if(s.startsWith('959') && s.length>10) s = '0'+s.slice(2);
  return s;
}

function validateMsisdn(raw){
  const s = normalizeMsisdn(raw);
  if(!s.startsWith('09')) return {valid:false,normalized:s,reason:'Must start with 09'};
  if(s.length!==10 && s.length!==11) return {valid:false,normalized:s,reason:`Expected 10\u201311 digits, got ${s.length}`};
  return {valid:true,normalized:s,reason:'OK'};
}

function cleanName(rawName){
  let name = String(rawName).trim();
  for(const prefix of MYANMAR_PREFIXES){
    const escaped = prefix.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re = new RegExp('^'+escaped+'(?:\\s+|(?=[A-Z]))','i');
    name = name.replace(re,'').trim();
  }
  return name.replace(/\s+/g,' ').trim();
}

function resolveColumns(colNames){
  const mapping = {};
  const lower = {};
  colNames.forEach(c => { lower[c.toLowerCase().trim()] = c; });
  for(const [canonical, aliases] of Object.entries(COLUMN_ALIASES)){
    for(const alias of aliases){
      if(alias in lower){ mapping[canonical] = lower[alias]; break; }
    }
    if(!(canonical in mapping)) throw new Error(`Missing required column. Expected one of: ${aliases.join(', ')}`);
  }
  return mapping;
}

function processEmployeeList(rows, headers){
  const colMap = resolveColumns(headers);
  return rows.map(row => {
    const rawName = String(row[colMap.name]||'').trim();
    const cleaned = cleanName(rawName);
    const v = validateMsisdn(row[colMap.msisdn]||'');
    const amt = parseFloat(row[colMap.amount]) || 0;
    return {
      Original_Name: rawName,
      Cleaned_Name: cleaned,
      MSISDN: v.normalized,
      MSISDN_Valid: v.valid,
      Validation_Status: v.valid ? '\u2705 Valid' : '\u274C Invalid',
      Validation_Reason: v.reason,
      Amount: amt,
      Name_Changed: rawName !== cleaned,
    };
  });
}

function reconcileAmounts(ticket, employees){
  const checks = [];
  const req = ticket.amount_requested;
  const slip = ticket.amount_on_bank_slip;

  if(slip != null){
    if(req === slip) checks.push({check:'Email vs Bank Slip',status:'pass',detail:`Both show ${fmt(req)} MMK \u2705`});
    else checks.push({check:'Email vs Bank Slip',status:'fail',detail:`Email: ${fmt(req)} vs Slip: ${fmt(slip)} \u2014 Gap: ${fmt(Math.abs(req-slip))} MMK`});
  } else {
    checks.push({check:'Email vs Bank Slip',status:'warn',detail:'No bank slip uploaded yet'});
  }

  if(employees && employees.length > 0){
    const empTotal = employees.reduce((s,e)=>s+e.Amount,0);
    if(empTotal === req) checks.push({check:'Employee Total vs Requested',status:'pass',detail:`Both show ${fmt(req)} MMK \u2705`});
    else checks.push({check:'Employee Total vs Requested',status:'fail',detail:`Employees: ${fmt(empTotal)} vs Requested: ${fmt(req)} \u2014 Gap: ${fmt(Math.abs(empTotal-req))} MMK`});
  } else {
    checks.push({check:'Employee Total vs Requested',status:'warn',detail:'No employee list uploaded yet'});
  }

  if(slip != null && employees && employees.length > 0){
    const empTotal = employees.reduce((s,e)=>s+e.Amount,0);
    if(req === slip && slip === empTotal) checks.push({check:'Three-Way Match',status:'pass',detail:`All sources agree: ${fmt(req)} MMK \u2705`});
    else checks.push({check:'Three-Way Match',status:'fail',detail:`Email: ${fmt(req)} | Slip: ${fmt(slip)} | Employees: ${fmt(empTotal)}`});
  }

  return checks;
}

function deriveStatus(t){
  if(t.finance_status === 'REJECTED') return 'REJECTED';
  if(t.sent_to_checker) return 'SENT_TO_CHECKER';
  if(t.prechecks_done && t.finance_status === 'APPROVED') return 'READY_FOR_CHECKER';
  if(!t.prechecks_done) return 'AWAITING_EMPLOYEE_LIST';
  return 'PENDING_FINANCE';
}

function computeRisk(t){
  if(t.has_mismatch || t.scenario === 'MISSING_APPROVAL') return 'HIGH';
  if((t.invalid_msisdn_count||0) > 0) return 'MEDIUM';
  return 'LOW';
}

function checkAuthorityMatrix(ticket){
  return (ticket.required_approvals||[]).map(reqRole => {
    const found = (ticket.email_approvals||[]).find(a => a.role.toLowerCase().includes(reqRole.toLowerCase()));
    return {requiredRole:reqRole, foundName:found?found.name:'\u2014', present:!!found};
  });
}

// ─── STATE MANAGEMENT ─────────────────────────────────────────────────────────

function saveState(){
  try{
    // Don't persist bank_slip_bytes (it's runtime only via slipDataUrls)
    const ticketsClean = {};
    for(const [k,t] of Object.entries(state.tickets)){
      const copy = {...t};
      delete copy.bank_slip_dataurl;
      ticketsClean[k] = copy;
    }
    localStorage.setItem(LS_TICKETS, JSON.stringify(ticketsClean));
    localStorage.setItem(LS_ACTIVITY, JSON.stringify(state.activityLog));
    localStorage.setItem(LS_PARSED, JSON.stringify([...state.parsedEmails]));
    localStorage.setItem(LS_ROLE, state.currentRole);
  } catch(e){ /* non-blocking */ }
}

function loadState(){
  try{
    const t = localStorage.getItem(LS_TICKETS);
    if(t) state.tickets = JSON.parse(t);
    const a = localStorage.getItem(LS_ACTIVITY);
    if(a) state.activityLog = JSON.parse(a);
    const p = localStorage.getItem(LS_PARSED);
    if(p) state.parsedEmails = new Set(JSON.parse(p));
    const r = localStorage.getItem(LS_ROLE);
    if(r) state.currentRole = r;
  } catch(e){ /* non-blocking */ }
}

function logActivity(msg){
  const now = new Date();
  const time = [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  state.activityLog.unshift({time, message:msg});
  if(state.activityLog.length > 20) state.activityLog.length = 20;
  saveState();
}

function generateTicketId(){
  const existing = Object.keys(state.tickets).filter(k=>k.startsWith('TKT-'));
  return 'TKT-'+String(existing.length+1).padStart(3,'0');
}

function updateTicket(id, updates){
  const t = state.tickets[id];
  Object.assign(t, updates);
  t.status = deriveStatus(t);
  t.risk_level = computeRisk(t);
  state.tickets[id] = t;
  saveState();
}

function resetDemo(){
  localStorage.removeItem(LS_TICKETS);
  localStorage.removeItem(LS_ACTIVITY);
  localStorage.removeItem(LS_PARSED);
  localStorage.removeItem(LS_ROLE);
  location.reload();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function fmt(n){ return Number(n).toLocaleString('en-US'); }
function nowTs(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':'); }
function allTickets(){ return Object.values(state.tickets); }
function countByStatus(s){ return allTickets().filter(t=>t.status===s).length; }

function statusBadgeHtml(s){
  const map = {AWAITING_EMPLOYEE_LIST:'badge-awaiting',PENDING_FINANCE:'badge-pending',READY_FOR_CHECKER:'badge-ready',REJECTED:'badge-rejected',SENT_TO_CHECKER:'badge-sent'};
  const labels = {AWAITING_EMPLOYEE_LIST:'Awaiting Emp. List',PENDING_FINANCE:'Pending Finance',READY_FOR_CHECKER:'Ready for Checker',REJECTED:'Rejected',SENT_TO_CHECKER:'Sent to Checker'};
  return `<span class="${map[s]||'badge-awaiting'}">${labels[s]||s}</span>`;
}
function riskBadgeHtml(r){
  const map = {HIGH:'badge-risk-high',MEDIUM:'badge-risk-medium',LOW:'badge-risk-low'};
  return `<span class="${map[r]||'badge-risk-low'}">${r}</span>`;
}
function typeBadgeHtml(t){
  return t==='SalaryToOTC'?'<span class="badge-type-otc">OTC</span>':'<span class="badge-type-ma">MA</span>';
}
function reconcileIcon(s){ return {pass:'\u2705',warn:'\u26A0\uFE0F',fail:'\u274C'}[s]||'\u2753'; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function handleParseEmail(emailId){
  const email = MOCK_EMAILS.find(e=>e.id===emailId);
  if(!email) return;

  const matrixComplete = email.required_approvals.every(req =>
    email.approvals.some(a => a.role.toLowerCase().includes(req.toLowerCase()))
  );
  const mismatch = email.amount_requested !== email.amount_on_bank_slip;

  const tid = generateTicketId();
  state.tickets[tid] = {
    id:tid, source_email_id:emailId, company:email.company, type:email.type,
    currency:email.currency, scenario:email.scenario, created_at:nowTs(),
    amount_requested:email.amount_requested, amount_on_bank_slip:email.amount_on_bank_slip,
    has_mismatch:mismatch, employee_total:null,
    required_approvals:email.required_approvals, email_approvals:email.approvals,
    approval_matrix_complete:matrixComplete,
    bank_slip_filename:null, bank_slip_type:null,
    prechecks_done:false, prechecks_at:null,
    employee_data:null, total_employees:0, invalid_msisdn_count:0, names_cleaned_count:0,
    employee_file_name:null, reconciliation:null,
    finance_status:'PENDING', finance_approved_by:null, finance_approved_at:null, finance_notes:null,
    sent_to_checker:false,
  };
  state.tickets[tid].status = deriveStatus(state.tickets[tid]);
  state.tickets[tid].risk_level = computeRisk(state.tickets[tid]);
  state.parsedEmails.add(emailId);
  saveState();
  logActivity(`${tid} created from ${email.company} email`);
  showToast(`\u2705 Ticket ${tid} created`);
  renderEmails();
}

function handleEmployeeUpload(input, emailId, ticketId){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const jsonRows = XLSX.utils.sheet_to_json(ws, {header:1});
      if(jsonRows.length < 2) throw new Error('File appears empty');

      const headers = jsonRows[0].map(String);
      const rows = jsonRows.slice(1).filter(r => r.some(c => c != null && c !== '')).map(r => {
        const obj = {};
        headers.forEach((h,i) => { obj[h] = r[i]; });
        return obj;
      });

      const processed = processEmployeeList(rows, headers);
      pendingEmployeeData[emailId] = processed;

      const invalidCount = processed.filter(r=>!r.MSISDN_Valid).length;
      const cleanedCount = processed.filter(r=>r.Name_Changed).length;
      const total = processed.reduce((s,r)=>s+r.Amount, 0);

      let preview = `<div style="margin-top:12px"><strong>\uD83D\uDCCA ${processed.length} records \u00B7 ${invalidCount} invalid MSISDNs \u00B7 ${cleanedCount} names cleaned</strong></div>`;

      // Preview table
      preview += '<div style="max-height:300px;overflow-y:auto;margin-top:8px"><table class="csv-table"><thead><tr><th>Original Name</th><th>Cleaned Name</th><th>MSISDN</th><th>Status</th><th>Amount</th></tr></thead><tbody>';
      processed.forEach(r => {
        preview += `<tr class="${r.MSISDN_Valid?'':'invalid'}"><td>${r.Original_Name}</td><td>${r.Cleaned_Name}</td><td>${r.MSISDN}</td><td>${r.Validation_Status}</td><td>${fmt(r.Amount)}</td></tr>`;
      });
      preview += '</tbody></table></div>';

      if(invalidCount > 0) preview += `<div class="alert alert-warn" style="margin-top:8px">\u26A0\uFE0F ${invalidCount} phone number(s) failed validation.</div>`;

      // Three-way reconciliation
      const ticket = state.tickets[ticketId];
      const recChecks = reconcileAmounts(ticket, processed);
      preview += '<div class="amounts-check" style="margin-top:12px"><strong style="font-size:14px;display:block;margin-bottom:8px">\uD83D\uDCB0 Amount Reconciliation</strong>';
      recChecks.forEach(chk => {
        const cls = chk.status==='pass'?'alert-success':chk.status==='fail'?'alert-danger':'alert-warn';
        preview += `<div class="ac-row"><span class="ac-icon">${reconcileIcon(chk.status)}</span><span class="ac-label">${chk.check}</span><span class="ac-detail">${chk.detail}</span></div>`;
      });
      preview += '</div>';

      document.getElementById('emp-preview-'+emailId).innerHTML = preview;
      document.getElementById('emp-zone-'+emailId).classList.add('has-file');
      // Enable submit button
      const submitBtn = document.getElementById('submit-btn-'+emailId);
      if(submitBtn) submitBtn.disabled = false;

    } catch(err){
      document.getElementById('emp-preview-'+emailId).innerHTML = `<div class="alert alert-danger" style="margin-top:8px">\u26A0\uFE0F ${err.message || 'Could not read file. Please upload a valid .xlsx or .csv'}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function handleBankSlipUpload(input, emailId, ticketId){
  const file = input.files[0];
  if(!file) return;

  const ticket = state.tickets[ticketId];
  ticket.bank_slip_filename = file.name;
  ticket.bank_slip_type = file.type;
  saveState();

  const previewEl = document.getElementById('slip-preview-'+emailId);
  if(file.type.startsWith('image/')){
    const reader = new FileReader();
    reader.onload = function(e){
      slipDataUrls[ticketId] = e.target.result;
      previewEl.innerHTML = `<img src="${e.target.result}" class="slip-preview" alt="Bank slip"/>`;
    };
    reader.readAsDataURL(file);
  } else {
    previewEl.innerHTML = `<div class="alert alert-info" style="margin-top:8px">\uD83D\uDCCE PDF uploaded: ${file.name}</div>`;
  }
  document.getElementById('slip-zone-'+emailId).classList.add('has-file');
}

function handleSaveSubmit(emailId, ticketId){
  const employees = pendingEmployeeData[emailId];
  if(!employees || employees.length === 0){
    showToast('\u26A0\uFE0F Upload an employee list first');
    return;
  }

  const ticket = state.tickets[ticketId];
  const invalidCount = employees.filter(r=>!r.MSISDN_Valid).length;
  const cleanedCount = employees.filter(r=>r.Name_Changed).length;
  const empTotal = employees.reduce((s,r)=>s+r.Amount, 0);
  const recChecks = reconcileAmounts(ticket, employees);
  const hasMismatch = ticket.amount_requested !== ticket.amount_on_bank_slip || recChecks.some(c=>c.status==='fail');

  updateTicket(ticketId, {
    prechecks_done: true,
    prechecks_at: nowTs(),
    employee_data: employees,
    total_employees: employees.length,
    invalid_msisdn_count: invalidCount,
    names_cleaned_count: cleanedCount,
    employee_file_name: 'uploaded',
    employee_total: empTotal,
    reconciliation: recChecks,
    has_mismatch: hasMismatch,
  });

  logActivity(`${ticketId} pre-checks complete \u2014 ${employees.length} employees`);
  showToast(`\u2705 ${ticketId} submitted for Finance Approval`);
  renderEmails();
}

  const el = document.getElementById('page-finance');

  if(state.currentRole !== 'Finance'){
    el.innerHTML = '<div class="role-locked"><div class="role-locked-icon">\uD83D\uDD12</div><h3>Access Restricted</h3><p>This page is for Finance role only. Switch role in the top bar.</p></div>';
    return;
  }

  const pending = allTickets().filter(t => t.finance_status === 'PENDING' && t.prechecks_done);

  let html = '<div class="section-title">\uD83D\uDCB0 Finance Approval</div><div class="section-sub">Review and approve disbursement tickets awaiting finance sign-off.</div>';

  if(pending.length === 0){
    html += '<div class="alert alert-success">\u2705 No tickets awaiting Finance approval.</div>';
    el.innerHTML = html;
    return;
  }

  pending.forEach(ticket => {
    const tid = ticket.id;
    html += `<div class="card"><div class="card-header"><div class="card-title">${tid} \u00B7 ${ticket.company} \u00B7 ${typeBadgeHtml(ticket.type)}</div>${riskBadgeHtml(ticket.risk_level)}</div><div class="card-body">`;

    html += `<div style="font-size:15px;font-weight:700;margin-bottom:16px">Requested: ${fmt(ticket.amount_requested)} MMK</div>`;

    // Authority matrix
    const matrix = checkAuthorityMatrix(ticket);
    html += `<strong style="font-size:13px">\uD83D\uDD10 Authority Matrix</strong>
      <table class="matrix-table" style="margin-top:6px"><thead><tr><th>Required</th><th>Email Found</th><th>Status</th></tr></thead><tbody>`;
    matrix.forEach(m => {
      html += `<tr><td>${m.requiredRole}</td><td>${m.foundName}</td><td>${m.present?'\u2705 Present':'\u274C Missing'}</td></tr>`;
    });
    html += '</tbody></table>';

    // Pre-check results
    html += `<div style="margin:16px 0"><strong style="font-size:13px">\uD83D\uDCCA Pre-check Results</strong><br>
      <span style="font-size:13px;color:var(--muted)">${ticket.total_employees||0} employees \u00B7 ${ticket.invalid_msisdn_count||0} invalid MSISDNs \u00B7 ${ticket.names_cleaned_count||0} names cleaned</span></div>`;

    // Reconciliation
    if(ticket.reconciliation){
      html += '<div class="amounts-check"><strong style="font-size:14px;display:block;margin-bottom:8px">\uD83D\uDCB0 Amount Reconciliation</strong>';
      ticket.reconciliation.forEach(chk => {
        html += `<div class="ac-row"><span class="ac-icon">${reconcileIcon(chk.status)}</span><span class="ac-label">${chk.check}</span><span class="ac-detail">${chk.detail}</span></div>`;
      });
      html += '</div>';
    }

    // Bank slip display
    if(slipDataUrls[tid]){
      html += `<div style="margin-bottom:16px"><strong style="font-size:13px">\uD83D\uDCCE Bank Slip</strong><br><img src="${slipDataUrls[tid]}" class="slip-preview" alt="Bank slip"/></div>`;
    } else if(ticket.bank_slip_filename){
      html += `<div class="alert alert-info">\uD83D\uDCCE Bank slip on record: ${ticket.bank_slip_filename}</div>`;
    }

    // Conditional warnings
    if(ticket.has_mismatch){
      html += `<div class="alert alert-warn">\u26A0\uFE0F <strong>Amount Mismatch:</strong> Email ${fmt(ticket.amount_requested)} MMK vs Bank Slip ${fmt(ticket.amount_on_bank_slip||0)} MMK</div>`;
    }
    if(ticket.scenario === 'MISSING_APPROVAL'){
      html += '<div class="alert alert-danger">\uD83D\uDD34 <strong>Missing Finance Approval</strong> in original email. Finance Manager sign-off was not found.</div>';
    }
    if(!ticket.approval_matrix_complete){
      const missing = matrix.filter(m=>!m.present).map(m=>m.requiredRole);
      html += `<div class="alert alert-warn">\u26A0\uFE0F <strong>Missing approvals:</strong> ${missing.join(', ')}</div>`;
    }

    // Approve/Reject form
    html += `<div class="grid-2" style="margin-top:20px">
      <div>
        <div class="form-group"><label class="form-label">Approved by (your name) <span class="req">*</span></label>
          <input type="text" id="appname-${tid}" placeholder="Enter your name"/></div>
        <div class="form-group"><label class="form-label">Notes (optional)</label>
          <input type="text" id="notes-${tid}" placeholder="Optional notes"/></div>
        <button class="btn btn-success" onclick="handleFinanceApprove('${tid}')">\u2705 Approve</button>
      </div>
      <div style="display:flex;align-items:flex-end">
        <button class="btn btn-danger" onclick="handleFinanceReject('${tid}')">\u274C Reject</button>
      </div>
    </div>`;

    html += '</div></div>';
  });

  el.innerHTML = html;
}

function handleFinanceApprove(tid){
  const nameEl = document.getElementById('appname-'+tid);
  const notesEl = document.getElementById('notes-'+tid);
  const name = nameEl ? nameEl.value.trim() : '';
  if(!name){ showToast('\u26A0\uFE0F Please enter your name before approving'); return; }

  updateTicket(tid, {
    finance_status:'APPROVED',
    finance_approved_by:name,
    finance_approved_at:nowTs(),
    finance_notes:(notesEl?notesEl.value.trim():'')||null,
  });
  logActivity(`${tid} approved by Finance (${name})`);
  showToast(`\u2705 ${tid} approved \u2014 Ready for E-Money team`);
  renderFinance();
}

function handleFinanceReject(tid){
  updateTicket(tid, {
    finance_status:'REJECTED',
    finance_approved_by:null,
    finance_approved_at:nowTs(),
    finance_notes:'Rejected by Finance.',
  });
  logActivity(`${tid} rejected by Finance`);
  showToast(`\u274C ${tid} rejected`);
  renderFinance();
}

// ─── PAGE: E-MONEY REVIEW ─────────────────────────────────────────────────────

function renderEmoney(){
  const el = document.getElementById('page-emoney');

  if(state.currentRole !== 'E-Money'){
    el.innerHTML = '<div class="role-locked"><div class="role-locked-icon">\uD83D\uDD12</div><h3>Access Restricted</h3><p>This page is for E-Money role only. Switch role in the top bar.</p></div>';
    return;
  }

  const ready = allTickets().filter(t => t.status === 'READY_FOR_CHECKER');
  const sent = allTickets().filter(t => t.status === 'SENT_TO_CHECKER');

  let html = '<div class="section-title">\uD83D\uDD01 E-Money Review</div><div class="section-sub">Tickets approved by Finance and ready for the E-Money checker team.</div>';

  if(ready.length === 0 && sent.length === 0){
    html += '<div class="alert alert-info">No tickets ready for E-Money yet.</div>';
    el.innerHTML = html;
    return;
  }

  if(ready.length > 0){
    html += '<div style="font-size:16px;font-weight:700;margin-bottom:16px">Ready for Checker</div>';
    ready.forEach(ticket => {
      const tid = ticket.id;
      html += `<div class="card"><div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div style="font-size:15px;font-weight:700">${tid} \u00B7 ${ticket.company} \u00B7 ${typeBadgeHtml(ticket.type)} \u00B7 ${fmt(ticket.amount_requested)} MMK</div>
          ${riskBadgeHtml(ticket.risk_level)}
        </div>`;

      html += `<div class="grid-2" style="margin-bottom:12px">
        <div>Pre-checks: <strong style="color:var(--success)">\u2705 Done</strong> (${ticket.total_employees||0} employees, ${ticket.invalid_msisdn_count||0} invalid)</div>
        <div>Finance: <strong style="color:var(--success)">\u2705 Approved by ${ticket.finance_approved_by||'\u2014'}</strong></div>
      </div>`;

      // Reconciliation summary
      if(ticket.reconciliation){
        const allPass = ticket.reconciliation.every(c => c.status === 'pass');
        if(allPass){
          html += `<div class="alert alert-success">\uD83D\uDCB0 All amounts match: ${fmt(ticket.amount_requested)} MMK \u2705</div>`;
        } else {
          ticket.reconciliation.filter(c=>c.status!=='pass').forEach(chk => {
            html += `<div class="alert alert-warn">\u26A0\uFE0F ${chk.check}: ${chk.detail}</div>`;
          });
        }
      }

      // Employee list expander
      if(ticket.employee_data && ticket.employee_data.length > 0){
        html += `<div class="expander-toggle" onclick="this.nextElementSibling.classList.toggle('open')">\u25B6 Show Cleaned Employee List (${ticket.employee_data.length} rows)</div>
          <div class="expander-body"><div style="max-height:250px;overflow-y:auto"><table class="csv-table"><thead><tr><th>Name</th><th>MSISDN</th><th>Amount</th><th>Status</th></tr></thead><tbody>`;
        ticket.employee_data.forEach(r => {
          html += `<tr class="${r.MSISDN_Valid?'':'invalid'}"><td>${r.Cleaned_Name}</td><td>${r.MSISDN}</td><td>${fmt(r.Amount)}</td><td>${r.Validation_Status}</td></tr>`;
        });
        html += '</tbody></table></div></div>';
      }

      // Action buttons
      html += `<div class="btn-group">
        <a href="${CHECKER_URL}" target="_blank" class="btn btn-primary">\uD83D\uDD17 Open in Checker Dashboard</a>
        <button class="btn btn-outline" onclick="handleExportJson('${tid}')">\uD83D\uDCE5 Export Ticket Data (JSON)</button>
        <button class="btn btn-success" onclick="handleMarkSent('${tid}')">\u2709\uFE0F Mark as Sent to Checker</button>
      </div>`;

      html += '</div></div>';
    });
  }

  if(sent.length > 0){
    html += '<div style="font-size:16px;font-weight:700;margin:24px 0 16px">Already Sent</div>';
    sent.forEach(ticket => {
      html += `<div class="card"><div class="card-body" style="padding:14px 24px">
        <span style="font-weight:600">\u2705 ${ticket.id}</span> \u00B7 ${ticket.company} \u00B7 ${typeBadgeHtml(ticket.type)} \u00B7 Sent to checker
      </div></div>`;
    });
  }

  el.innerHTML = html;
}

function handleExportJson(tid){
  const ticket = {...state.tickets[tid]};
  delete ticket.bank_slip_dataurl;
  const blob = new Blob([JSON.stringify(ticket, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = tid+'_export.json'; a.click();
  URL.revokeObjectURL(url);
  logActivity(`${tid} data exported for checker`);
  showToast(`\uD83D\uDCE5 ${tid} exported`);
}

function handleMarkSent(tid){
  updateTicket(tid, {sent_to_checker:true});
  logActivity(`${tid} marked as sent to E-Money checker`);
  showToast(`\u2705 ${tid} sent to checker`);
  renderEmoney();
}

// ─── KEYBOARD SHORTCUT ────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.shiftKey && e.key === 'R'){ e.preventDefault(); resetDemo(); }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
initState();
renderDashboard();

</script>
</body>
</html>
